name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin/arm64
            artifact_name: nettopo-switch-darwin-arm64
            source_path: build/bin/nettopo-switch-darwin-arm64.app
            artifact_path: build/bin/nettopo-switch-darwin-arm64.zip
          - os: macos-15-intel
            platform: darwin/amd64
            artifact_name: nettopo-switch-darwin-amd64
            source_path: build/bin/nettopo-switch-darwin-amd64.app
            artifact_path: build/bin/nettopo-switch-darwin-amd64.zip
          - os: windows-latest
            platform: windows/amd64
            artifact_name: nettopo-switch-windows-amd64
            source_path: build/bin/nettopo-switch-windows-amd64.exe
            artifact_path: build/bin/nettopo-switch-windows-amd64.zip
          - os: windows-latest
            platform: windows/arm64
            artifact_name: nettopo-switch-windows-arm64
            source_path: build/bin/nettopo-switch-windows-arm64.exe
            artifact_path: build/bin/nettopo-switch-windows-arm64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop package
        shell: bash
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          wails build -platform "${{ matrix.platform }}"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            rm -rf "${{ matrix.source_path }}"
            mv build/bin/codex-deepseek-bridge.app "${{ matrix.source_path }}"
          else
            mv build/bin/CodexDeepSeekBridge.exe "${{ matrix.source_path }}"
          fi

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ditto -c -k --sequesterRsrc --keepParent "${{ matrix.source_path }}" "${{ matrix.artifact_path }}"
          else
            pwsh -NoProfile -Command "Compress-Archive -Path '${{ matrix.source_path }}' -DestinationPath '${{ matrix.artifact_path }}' -Force"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nettopo-switch-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
